[project]
name = "udaan-contracts"
version = "0.0.0"
description = "Cross-phase contracts (Pydantic view) for the Udaan Research Agent."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.7"]

[dependency-groups]
dev = ["datamodel-code-generator>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["udaan_contracts"]
